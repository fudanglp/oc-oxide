name: Build Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux artifacts
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      HAS_RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY != '' }}
      HAS_TAURI_UPDATE_SIGNATURE: ${{ secrets.TAURI_UPDATE_SIGNATURE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            bison \
            build-essential \
            clang \
            dpkg-dev \
            gettext \
            gperf \
            gnupg \
            libayatana-appindicator3-dev \
            libclang-dev \
            libgtk-3-dev \
            libssl-dev \
            libtool \
            libwebkit2gtk-4.1-dev \
            libxml2-dev \
            librsvg2-dev \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup default 1.89.0
          rustc --version
          cargo --version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Cache Cargo builds
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-rust-1.89.0-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'bins/**/Cargo.toml', 'apps/desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-1.89.0-

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Build Linux release artifacts
        run: |
          make dist-tarball
          SKIP_BUILD=1 make package-deb
          make apt-repo
          install -m 0755 packaging/linux/install-release.sh dist/install.sh
          (cd dist && sha256sum install.sh > install.sh.sha256)
          tar -C dist -czf dist/oc-oxide-apt-repo.tar.gz apt
          (cd dist && sha256sum oc-oxide-apt-repo.tar.gz > oc-oxide-apt-repo.tar.gz.sha256)

      - name: Import release signing key
        if: env.HAS_RELEASE_GPG_KEY == 'true'
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign Linux release artifacts
        if: env.HAS_RELEASE_GPG_KEY == 'true'
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          SIGNING_KEY: ${{ secrets.RELEASE_GPG_KEY_ID }}
        run: ./packaging/linux/sign-artifacts.sh

      - name: Sign apt repository metadata
        if: env.HAS_RELEASE_GPG_KEY == 'true'
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          SIGNING_KEY: ${{ secrets.RELEASE_GPG_KEY_ID }}
        run: |
          rm -rf dist/apt
          ./packaging/linux/build-apt-repo.sh

      - name: Generate updater manifest
        if: startsWith(github.ref, 'refs/tags/') && env.HAS_TAURI_UPDATE_SIGNATURE == 'true'
        env:
          TAURI_UPDATE_SIGNATURE: ${{ secrets.TAURI_UPDATE_SIGNATURE }}
          SIGNING_KEY: ${{ secrets.RELEASE_GPG_KEY_ID }}
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          arch=$(uname -m)
          TAURI_UPDATE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/oc-oxide-${version}-linux-${arch}.tar.gz" \
            ./packaging/linux/generate-updater-json.sh
          if [ -f dist/latest.json ] && [ "${HAS_RELEASE_GPG_KEY:-false}" = "true" ]; then
            ./packaging/linux/sign-artifacts.sh dist/latest.json
          fi

      - name: Verify Linux release artifacts
        run: |
          cd dist
          sha256sum -c oc-oxide-*.tar.gz.sha256
          sha256sum -c oc-oxide-apt-repo.tar.gz.sha256
          sha256sum -c oc-oxide_*.deb.sha256
          sha256sum -c install.sh.sha256
          if [ -f latest.json ]; then
            python3 -m json.tool latest.json >/dev/null
          fi
          if grep -R "$GITHUB_WORKSPACE" ./*.sha256; then
            echo "checksum files must not contain runner-local absolute paths" >&2
            exit 1
          fi
          test -f apt/dists/stable/Release
          test -f apt/dists/stable/main/binary-*/Packages.gz
          dist_dir=$(find . -maxdepth 1 -type d -name 'oc-oxide-*-linux-*' -print -quit)
          if [ -z "$dist_dir" ]; then
            echo "missing extracted local dist directory" >&2
            exit 1
          fi
          cd "$dist_dir"
          sha256sum -c SHA256SUMS
          ./bin/ocx help >/dev/null

      - name: List artifacts
        run: find dist -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: oc-oxide-linux-${{ github.run_id }}
          if-no-files-found: error
          path: |
            dist/oc-oxide-*.tar.gz
            dist/oc-oxide-*.tar.gz.sha256
            dist/oc-oxide-apt-repo.tar.gz
            dist/oc-oxide-apt-repo.tar.gz.sha256
            dist/oc-oxide_*.deb
            dist/oc-oxide_*.deb.sha256
            dist/install.sh
            dist/install.sh.sha256
            dist/*.asc
            dist/latest.json
            dist/apt/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=$(find dist -maxdepth 1 -type f \( \
            -name 'oc-oxide-*.tar.gz' -o \
            -name 'oc-oxide-*.tar.gz.sha256' -o \
            -name 'oc-oxide-apt-repo.tar.gz' -o \
            -name 'oc-oxide-apt-repo.tar.gz.sha256' -o \
            -name 'oc-oxide_*.deb' -o \
            -name 'oc-oxide_*.deb.sha256' -o \
            -name 'install.sh' -o \
            -name 'install.sh.sha256' -o \
            -name '*.asc' -o \
            -name 'latest.json' \
          \) -print | sort)
          gh release create "$GITHUB_REF_NAME" \
            $assets \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
